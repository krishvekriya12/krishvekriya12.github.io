name: Update Play Store & GitHub data

on:
  schedule:
    # Daily at 03:30 UTC (09:00 IST) — new Play Store apps appear within a day
    - cron: "30 3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Fetch Play Store & GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: sync Play Store & GitHub data [skip ci]"
            git push
          fi
